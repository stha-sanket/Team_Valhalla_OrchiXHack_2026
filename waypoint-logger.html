<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Waypoint Logger</title>
<style>
  :root{
    --copper: #c97b3d;
    --marigold: #e0a527;
    --brick: #7a2e2e;
    --ink: #14110d;
    --paper: #f4ecdc;
    --ok: #5fb87a;
    --warn: #e0a527;
    --bad: #d96b5e;
    --panel: #1d1913;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; background:var(--ink); color:var(--paper);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height:100%;
  }
  .wrap{ max-width:520px; margin:0 auto; padding:16px 16px 40px; }

  header{ padding: max(10px, env(safe-area-inset-top)) 0 8px; }
  .eyebrow{ color:var(--marigold); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; }
  h1{ font-size:20px; margin:4px 0 0; }

  .card{
    background:var(--panel); border:1px solid rgba(255,255,255,0.08);
    border-radius:14px; padding:16px; margin-top:14px;
  }

  /* live position card */
  #posCard .row{ display:flex; justify-content:space-between; align-items:baseline; margin:4px 0; }
  #posCard .row .k{ color:#a89f8c; font-size:12.5px; }
  #posCard .row .v{ font-size:14px; font-variant-numeric:tabular-nums; }
  #accBadge{
    display:inline-block; padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:700;
  }
  #accBadge.good{ background:rgba(95,184,122,0.18); color:var(--ok); }
  #accBadge.ok{ background:rgba(224,165,39,0.18); color:var(--marigold); }
  #accBadge.bad{ background:rgba(217,107,94,0.18); color:var(--bad); }
  #accBadge.none{ background:rgba(255,255,255,0.08); color:#a89f8c; }

  label{ display:block; font-size:12px; color:#a89f8c; margin-bottom:6px; letter-spacing:0.03em; }
  input[type=text]{
    width:100%; padding:12px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
    background:#12100c; color:var(--paper); font-size:15px; margin-bottom:10px;
  }
  input[type=text]:focus{ outline:none; border-color:var(--marigold); }

  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn-primary{
    width:100%; padding:15px; border-radius:11px; font-size:15px; font-weight:700;
    background:linear-gradient(135deg,var(--marigold),var(--copper)); color:#241705;
  }
  .btn-primary:disabled{ opacity:0.4; }
  .btn-primary:active{ transform:scale(0.98); }
  .btn-row{ display:flex; gap:8px; margin-top:10px; }
  .btn-secondary{
    flex:1; padding:11px; border-radius:10px; font-size:13.5px; font-weight:600;
    background:rgba(255,255,255,0.08); color:var(--paper);
  }
  .btn-secondary.danger{ background:rgba(217,107,94,0.15); color:var(--bad); }

  /* waypoint list */
  #wpList{ list-style:none; margin:0; padding:0; }
  #wpList li{
    display:flex; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);
  }
  #wpList li:last-child{ border-bottom:none; }
  .wp-index{
    width:24px; height:24px; border-radius:50%; background:rgba(224,165,39,0.18); color:var(--marigold);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;
  }
  .wp-info{ flex:1; min-width:0; }
  .wp-label{ font-size:14px; font-weight:600; }
  .wp-coords{ font-size:11.5px; color:#a89f8c; font-variant-numeric:tabular-nums; }
  .wp-actions{ display:flex; gap:4px; flex-shrink:0; }
  .icon-btn{
    width:30px; height:30px; border-radius:8px; background:rgba(255,255,255,0.06); color:var(--paper);
    font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .icon-btn.danger{ color:var(--bad); }
  #emptyState{ color:#7a7264; font-size:13px; text-align:center; padding:18px 0; }

  #routeChips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .chip{
    padding:6px 11px; border-radius:999px; font-size:12px; background:rgba(255,255,255,0.06); color:#c9c2b3;
  }
  .chip b{ color:var(--paper); }

  #toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--marigold); color:#241705; font-weight:700; font-size:13.5px;
    padding:10px 18px; border-radius:999px; opacity:0; transition:all 0.25s; pointer-events:none; z-index:50;
    white-space:nowrap;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  #jsonPreview{
    width:100%; min-height:120px; background:#0f0d09; color:#c9c2b3; border:1px solid rgba(255,255,255,0.1);
    border-radius:10px; padding:10px; font-family:'SF Mono', Consolas, monospace; font-size:11.5px;
    white-space:pre; overflow:auto; margin-top:10px; display:none;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Venue Setup Tool</div>
    <h1>Waypoint Logger</h1>
  </header>

  <!-- LIVE POSITION -->
  <div class="card" id="posCard">
    <div class="row"><span class="k">Latitude</span><span class="v" id="curLat">—</span></div>
    <div class="row"><span class="k">Longitude</span><span class="v" id="curLng">—</span></div>
    <div class="row"><span class="k">Accuracy</span><span id="accBadge" class="none">no fix yet</span></div>
  </div>

  <!-- CAPTURE -->
  <div class="card">
    <label for="routeName">Route name</label>
    <input type="text" id="routeName" placeholder="e.g. Entrance to Team Room B" value="Route 1" />

    <label for="wpLabel">Waypoint label</label>
    <input type="text" id="wpLabel" placeholder="e.g. Courtyard door" />

    <button class="btn-primary" id="captureBtn" disabled>Waiting for GPS…</button>
    <div id="routeChips"></div>
  </div>

  <!-- WAYPOINT LIST -->
  <div class="card">
    <label style="margin-bottom:10px;">Captured waypoints, in order</label>
    <ul id="wpList"></ul>
    <div id="emptyState">No waypoints yet — walk to your first point and capture it above.</div>

    <div class="btn-row">
      <button class="btn-secondary" id="exportBtn">Copy JSON</button>
      <button class="btn-secondary" id="downloadBtn">Download .json</button>
      <button class="btn-secondary danger" id="clearBtn">Clear route</button>
    </div>
    <pre id="jsonPreview"></pre>
  </div>

</div>

<div id="toast"></div>

<script>
(function(){
  "use strict";

  let waypoints = [];       // current route being built
  let savedRoutes = [];     // routes already exported/saved this session
  let lastPos = null;

  const curLat = document.getElementById('curLat');
  const curLng = document.getElementById('curLng');
  const accBadge = document.getElementById('accBadge');
  const captureBtn = document.getElementById('captureBtn');
  const wpLabelInput = document.getElementById('wpLabel');
  const routeNameInput = document.getElementById('routeName');
  const wpList = document.getElementById('wpList');
  const emptyState = document.getElementById('emptyState');
  const jsonPreview = document.getElementById('jsonPreview');
  const routeChips = document.getElementById('routeChips');
  const toast = document.getElementById('toast');

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function accuracyClass(acc){
    if (acc == null) return 'none';
    if (acc <= 10) return 'good';
    if (acc <= 25) return 'ok';
    return 'bad';
  }

  function onPosition(pos){
    lastPos = pos;
    const { latitude, longitude, accuracy } = pos.coords;
    curLat.textContent = latitude.toFixed(6);
    curLng.textContent = longitude.toFixed(6);
    accBadge.textContent = `±${Math.round(accuracy)} m`;
    accBadge.className = accuracyClass(accuracy);
    captureBtn.disabled = false;
    captureBtn.textContent = `Capture waypoint here (±${Math.round(accuracy)} m)`;
  }

  function onError(err){
    accBadge.textContent = 'GPS error';
    accBadge.className = 'bad';
    captureBtn.textContent = 'Waiting for GPS…';
    captureBtn.disabled = true;
    showToast(err.message);
  }

  if ('geolocation' in navigator){
    navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true, maximumAge: 1000, timeout: 20000
    });
  } else {
    accBadge.textContent = 'Geolocation unsupported';
  }

  function render(){
    wpList.innerHTML = '';
    emptyState.style.display = waypoints.length ? 'none' : 'block';

    waypoints.forEach((wp, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <div class="wp-index">${i+1}</div>
        <div class="wp-info">
          <div class="wp-label"></div>
          <div class="wp-coords">${wp.lat.toFixed(6)}, ${wp.lng.toFixed(6)} · ±${Math.round(wp.accuracy)}m</div>
        </div>
        <div class="wp-actions">
          <button class="icon-btn" data-act="up" data-i="${i}" title="Move up">↑</button>
          <button class="icon-btn" data-act="down" data-i="${i}" title="Move down">↓</button>
          <button class="icon-btn danger" data-act="del" data-i="${i}" title="Delete">✕</button>
        </div>
      `;
      li.querySelector('.wp-label').textContent = wp.label;
      wpList.appendChild(li);
    });

    routeChips.innerHTML = savedRoutes.map(r =>
      `<span class="chip"><b>${r.route_name}</b> · ${r.waypoints.length} pts</span>`
    ).join('');

    jsonPreview.style.display = 'none';
  }

  wpList.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const i = parseInt(btn.dataset.i, 10);
    const act = btn.dataset.act;
    if (act === 'del'){
      waypoints.splice(i, 1);
    } else if (act === 'up' && i > 0){
      [waypoints[i-1], waypoints[i]] = [waypoints[i], waypoints[i-1]];
    } else if (act === 'down' && i < waypoints.length - 1){
      [waypoints[i+1], waypoints[i]] = [waypoints[i], waypoints[i+1]];
    }
    render();
  });

  captureBtn.addEventListener('click', () => {
    if (!lastPos) return;
    const label = wpLabelInput.value.trim() || `Point ${waypoints.length + 1}`;
    waypoints.push({
      label,
      lat: lastPos.coords.latitude,
      lng: lastPos.coords.longitude,
      accuracy: lastPos.coords.accuracy
    });
    wpLabelInput.value = '';
    render();
    showToast(`Captured "${label}"`);
  });

  function currentRouteJson(){
    return {
      route_name: routeNameInput.value.trim() || 'Untitled route',
      waypoints: waypoints.map(({label, lat, lng}) => ({
        label, lat: Number(lat.toFixed(7)), lng: Number(lng.toFixed(7))
      }))
    };
  }

  function fullExportJson(){
    const routes = [...savedRoutes];
    if (waypoints.length) routes.push(currentRouteJson());
    return JSON.stringify(routes.length === 1 ? routes[0] : routes, null, 2);
  }

  document.getElementById('exportBtn').addEventListener('click', async () => {
    const json = fullExportJson();
    jsonPreview.textContent = json;
    jsonPreview.style.display = 'block';
    try{
      await navigator.clipboard.writeText(json);
      showToast('Copied JSON to clipboard');
    } catch(e){
      showToast('Copy failed — select the text below manually');
    }
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const json = fullExportJson();
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (routeNameInput.value.trim() || 'route').replace(/\s+/g, '-').toLowerCase() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Downloaded');
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (waypoints.length && !confirm('Save this route before clearing? Press OK to save it first, Cancel to just discard it.')){
      waypoints = [];
      render();
      return;
    }
    if (waypoints.length){
      savedRoutes.push(currentRouteJson());
      waypoints = [];
      routeNameInput.value = `Route ${savedRoutes.length + 1}`;
      showToast('Route saved — starting a new one');
    }
    render();
  });

  render();
})();
</script>
</body>
</html>
