<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Hackathon AR Pathfinder</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  :root{
    --copper: #c97b3d;
    --marigold: #e0a527;
    --brick: #7a2e2e;
    --ink: #14110d;
    --paper: #f4ecdc;
    --ok: #5fb87a;
    --warn: #e0a527;
    --bad: #d96b5e;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{
    margin:0; padding:0; overflow:hidden; height:100%;
    background:#000; color:var(--paper);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  a-scene{ position:absolute; inset:0; z-index:1; }

  /* ---------- Gate ---------- */
  #gate{
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(1200px 600px at 50% -10%, rgba(224,165,39,0.15), transparent), var(--ink);
    text-align:center; padding:32px;
  }
  #gate .eyebrow{ color:var(--marigold); font-size:12px; letter-spacing:0.24em; text-transform:uppercase; margin-bottom:14px; font-weight:600; }
  #gate h1{ font-size:24px; margin:0 0 6px; }
  #gate p{ color:#c9c2b3; max-width:340px; line-height:1.5; font-size:14.5px; }
  #startBtn{
    margin-top:26px; padding:16px 40px; font-size:16px; font-weight:600;
    border:none; border-radius:999px; cursor:pointer;
    background:linear-gradient(135deg,var(--marigold),var(--copper)); color:#241705;
    box-shadow:0 8px 24px rgba(224,165,39,0.35);
  }
  #startBtn:active{ transform:scale(0.97); }
  #gateError{ margin-top:18px; color:#f0a5a5; font-size:13px; max-width:320px; display:none; }

  /* ---------- Loading ---------- */
  #loading{
    position:fixed; inset:0; z-index:90;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--ink); gap:14px;
  }
  #loading.hidden{ display:none; }
  .spinner{
    width:34px; height:34px; border-radius:50%;
    border:3px solid rgba(224,165,39,0.2); border-top-color:var(--marigold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #loading .msg{ color:#c9c2b3; font-size:14px; text-align:center; padding:0 30px; }

  /* ---------- Top bar ---------- */
  #topbar{
    position:fixed; top:0; left:0; right:0; z-index:20;
    display:flex; gap:8px; align-items:center;
    padding: max(12px, env(safe-area-inset-top)) 12px 12px;
    background:linear-gradient(rgba(0,0,0,0.65), transparent);
  }
  #routeSelect{
    flex:1; min-width:0; padding:11px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
    background:rgba(20,17,13,0.85); color:var(--paper); font-size:14px;
  }
  #reverseBtn{
    padding:11px 14px; border-radius:10px; border:none; font-weight:600; cursor:pointer;
    background:rgba(255,255,255,0.1); color:var(--paper); font-size:14px;
  }
  #reverseBtn.active{ background:var(--marigold); color:#241705; }

  /* ---------- Progress strip ---------- */
  #progress{
    position:fixed; top:64px; left:12px; right:12px; z-index:20;
    display:flex; align-items:center; gap:8px;
  }
  #progressBar{
    flex:1; height:5px; border-radius:999px; background:rgba(255,255,255,0.12); overflow:hidden;
  }
  #progressFill{
    height:100%; background:linear-gradient(90deg,var(--copper),var(--marigold)); width:0%;
    transition:width 0.3s ease;
  }
  #progressLabel{ font-size:11.5px; color:#c9c2b3; white-space:nowrap; }

  #calibrateBanner{
    position:fixed; top:96px; left:12px; right:12px; z-index:21;
    background:rgba(224,165,39,0.16); border:1px solid rgba(224,165,39,0.4);
    color:var(--marigold); font-size:12px; padding:8px 12px; border-radius:10px;
    display:none; text-align:center;
  }
  #calibrateBanner.show{ display:block; }

  /* ---------- HUD ---------- */
  #hud{
    position:fixed; left:0; right:0; bottom:0; z-index:15;
    display:flex; flex-direction:column; align-items:center;
    padding: 18px 16px max(18px, env(safe-area-inset-bottom));
    background:linear-gradient(transparent, rgba(0,0,0,0.78) 55%);
  }
  #compassWrap{
    width:150px; height:150px; border-radius:50%;
    background:radial-gradient(circle at 50% 40%, rgba(224,165,39,0.14), rgba(0,0,0,0.35));
    border:1px solid rgba(224,165,39,0.35);
    display:flex; align-items:center; justify-content:center;
    position:relative; margin-bottom:10px;
  }
  #arrowSvg{ width:88px; height:88px; transition: transform 0.15s linear; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  #arrivedBadge{
    position:absolute; inset:0; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; opacity:0; transition:opacity 0.3s;
  }
  #arrivedBadge.show{ opacity:1; }
  #distText{ font-size:22px; font-weight:700; color:var(--paper); }
  #legText{ font-size:13px; color:var(--marigold); margin-top:2px; text-transform:uppercase; letter-spacing:0.1em; text-align:center; }
  #totalRemainText{ font-size:11.5px; color:#a89f8c; margin-top:4px; }

  #navButtons{ display:flex; gap:10px; margin-top:14px; width:100%; max-width:280px; }
  .navBtn{
    flex:1; padding:11px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer;
    background:rgba(255,255,255,0.1); color:var(--paper);
  }
  .navBtn:active{ transform:scale(0.97); }
  .navBtn.primary{ background:var(--marigold); color:#241705; }
  .navBtn:disabled{ opacity:0.35; }

  #headingBadge{
    position:fixed; top:64px; right:12px; z-index:20;
    background:rgba(20,17,13,0.75); border:1px solid rgba(255,255,255,0.12);
    border-radius:10px; padding:5px 9px; font-size:10.5px; color:#c9c2b3;
    display:none;
  }
</style>
</head>

<body>

  <div id="gate">
    <div class="eyebrow">Hackathon Venue</div>
    <h1>AR Pathfinder</h1>
    <p>Follow the arrow leg-by-leg through the real waypoints of your venue. Needs your location and compass.</p>
    <button id="startBtn">Start Navigating</button>
    <div id="gateError"></div>
  </div>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <div class="msg">Getting your position…</div>
  </div>

  <div id="topbar">
    <select id="routeSelect"></select>
    <button id="reverseBtn">⇄ Reverse</button>
  </div>

  <div id="progress">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressLabel">0 / 0</div>
  </div>
  <div id="calibrateBanner">↺ Wave your phone in a figure-8 to calibrate the compass</div>
  <div id="headingBadge">hdg —°</div>

  <div id="hud">
    <div id="compassWrap">
      <svg id="arrowSvg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="arrowGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#c97b3d"/>
            <stop offset="100%" stop-color="#e0a527"/>
          </linearGradient>
        </defs>
        <polygon points="50,6 78,62 50,48 22,62" fill="url(#arrowGrad)" stroke="#241705" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="50" cy="70" r="9" fill="#241705" opacity="0.55"/>
      </svg>
      <div id="arrivedBadge">📍</div>
    </div>
    <div id="distText">— m</div>
    <div id="legText">Loading route…</div>
    <div id="totalRemainText"></div>
    <div id="navButtons">
      <button class="navBtn" id="prevBtn">← Back</button>
      <button class="navBtn primary" id="nextBtn">Skip →</button>
    </div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    embedded
    renderer="antialias: true; alpha: true"
    loading-screen="enabled: false">

    <a-camera
      id="camera"
      gps-new-camera="gpsMinDistance: 2"
      arjs-device-orientation-controls="smoothingFactor: 0.1"
      look-controls-enabled="false">
    </a-camera>

    <a-entity id="destinationMarker">
      <a-cylinder radius="0.4" height="0.08" color="#c97b3d"></a-cylinder>
      <a-cylinder radius="0.1" height="0.9" color="#c97b3d" position="0 0.45 0"></a-cylinder>
      <a-sphere radius="0.16" color="#e0a527" position="0 0.95 0"></a-sphere>
      <a-ring radius-inner="0.4" radius-outer="0.53" color="#e0a527" opacity="0.55" position="0 0.05 0"
        animation="property: scale; from: 1 1 1; to: 2 2 2; dur: 1600; loop: true; easing: easeOutQuad"
        animation__fade="property: opacity; from: 0.55; to: 0; dur: 1600; loop: true; easing: easeOutQuad">
      </a-ring>
    </a-entity>

    <a-entity id="destinationLabel" position="0 2.1 0" look-at="[gps-new-camera]">
      <a-text id="destText" value="" color="#f4ecdc" align="center" scale="3.4 3.4 3.4" font="mozillavr"></a-text>
    </a-entity>

    <a-entity id="pathContainer"></a-entity>
  </a-scene>

<script>
(function(){
  "use strict";

  // ============================================================
  // ROUTE DATA — real captured venue coordinates.
  // Add more routes to this object the same way (paste more
  // JSON from the waypoint logger tool as new keys).
  // ============================================================
  const ROUTES = {
    "Valhalla": {
      route_name: "Valhalla",
      waypoints: [
        { label: "Team Valhalla",       lat: 27.7019804, lng: 85.3484771 },
        { label: "Doorway to Valhalla", lat: 27.702012,  lng: 85.3484743 },
        { label: "Main door",           lat: 27.7020255, lng: 85.3484847 },
        { label: "Football court",      lat: 27.7020618, lng: 85.3482863 },
        { label: "Main gate",           lat: 27.7020056, lng: 85.3482352 }
      ]
    }
  };

  // Arrival tuning: two-condition auto-advance, see chat explanation.
  const ARRIVAL_RADIUS_M = 6;

  let currentRouteKey = Object.keys(ROUTES)[0];
  let activeWaypoints = ROUTES[currentRouteKey].waypoints.slice();
  let reversed = false;
  let legIndex = 1; // index into activeWaypoints we are walking TOWARD (0 = origin/start, not a target)

  let userLat = null, userLng = null;
  let smoothedHeading = null;
  let firstFixReceived = false;

  // DOM
  const gate = document.getElementById('gate');
  const gateError = document.getElementById('gateError');
  const startBtn = document.getElementById('startBtn');
  const loading = document.getElementById('loading');
  const arrowSvg = document.getElementById('arrowSvg');
  const distText = document.getElementById('distText');
  const legText = document.getElementById('legText');
  const totalRemainText = document.getElementById('totalRemainText');
  const arrivedBadge = document.getElementById('arrivedBadge');
  const headingBadge = document.getElementById('headingBadge');
  const calibrateBanner = document.getElementById('calibrateBanner');
  const routeSelect = document.getElementById('routeSelect');
  const reverseBtn = document.getElementById('reverseBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const destText = document.getElementById('destText');

  // ============================================================
  // GEO MATH
  // ============================================================
  function toRad(d){ return d * Math.PI / 180; }

  function calculateBearing(lat1, lng1, lat2, lng2){
    const dLng = toRad(lng2 - lng1);
    const phi1 = toRad(lat1), phi2 = toRad(lat2);
    const x = Math.sin(dLng) * Math.cos(phi2);
    const y = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(dLng);
    return (Math.atan2(x, y) * 180 / Math.PI + 360) % 360;
  }

  function calculateDistance(lat1, lng1, lat2, lng2){
    const R = 6371000;
    const phi1 = toRad(lat1), phi2 = toRad(lat2);
    const dPhi = toRad(lat2 - lat1), dLambda = toRad(lng2 - lng1);
    const a = Math.sin(dPhi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dLambda/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ============================================================
  // ROUTE SETUP
  // ============================================================
  function populateRouteSelect(){
    routeSelect.innerHTML = '';
    Object.keys(ROUTES).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = ROUTES[key].route_name;
      routeSelect.appendChild(opt);
    });
  }

  function loadRoute(key){
    currentRouteKey = key;
    const base = ROUTES[key].waypoints;
    activeWaypoints = reversed ? base.slice().reverse() : base.slice();
    legIndex = 1;
    updateArPin();
    if (userLat != null) drawWaypointTrail();
    updateHud();
  }

  routeSelect.addEventListener('change', () => loadRoute(routeSelect.value));

  reverseBtn.addEventListener('click', () => {
    reversed = !reversed;
    reverseBtn.classList.toggle('active', reversed);
    loadRoute(currentRouteKey);
  });

  // ============================================================
  // LEG NAVIGATION
  // ============================================================
  function currentTarget(){ return activeWaypoints[legIndex]; }
  function hasNextLeg(){ return legIndex < activeWaypoints.length - 1; }
  function hasPrevLeg(){ return legIndex > 1; }

  function advanceLeg(){
    if (hasNextLeg()){
      legIndex++;
      updateArPin();
      updateHud();
    }
  }
  function retreatLeg(){
    if (hasPrevLeg()){
      legIndex--;
      updateArPin();
      updateHud();
    }
  }
  nextBtn.addEventListener('click', advanceLeg);
  prevBtn.addEventListener('click', retreatLeg);

  function remainingRouteDistance(fromLat, fromLng){
    // distance to current target, plus every full leg after it
    let d = calculateDistance(fromLat, fromLng, currentTarget().lat, currentTarget().lng);
    for (let i = legIndex; i < activeWaypoints.length - 1; i++){
      d += calculateDistance(
        activeWaypoints[i].lat, activeWaypoints[i].lng,
        activeWaypoints[i+1].lat, activeWaypoints[i+1].lng
      );
    }
    return d;
  }

  // ============================================================
  // HUD
  // ============================================================
  function updateHud(){
    progressLabel.textContent = `${legIndex} / ${activeWaypoints.length - 1}`;
    progressFill.style.width = `${(legIndex / (activeWaypoints.length - 1)) * 100}%`;

    const target = currentTarget();
    const isFinal = !hasNextLeg();
    legText.textContent = isFinal ? `Final: ${target.label}` : `Next: ${target.label}`;
    prevBtn.disabled = !hasPrevLeg();
    nextBtn.textContent = isFinal ? 'Skip →' : 'Skip →';
    nextBtn.disabled = !hasNextLeg();

    if (userLat == null || smoothedHeading == null) return;

    const distance = calculateDistance(userLat, userLng, target.lat, target.lng);
    const bearing = calculateBearing(userLat, userLng, target.lat, target.lng);
    let rel = bearing - smoothedHeading;
    rel = ((rel + 180) % 360 + 360) % 360 - 180;
    arrowSvg.style.transform = `rotate(${rel}deg)`;

    const totalRemain = remainingRouteDistance(userLat, userLng);
    totalRemainText.textContent = isFinal
      ? ''
      : `${Math.round(totalRemain)} m to ${activeWaypoints[activeWaypoints.length-1].label}`;

    if (distance < ARRIVAL_RADIUS_M){
      if (isFinal){
        distText.textContent = "You're here";
        distText.style.color = '#5fb87a';
        arrivedBadge.classList.add('show');
        arrowSvg.style.opacity = '0.25';
      } else {
        distText.textContent = `${Math.round(distance)} m`;
        distText.style.color = '#f4ecdc';
        arrivedBadge.classList.remove('show');
        arrowSvg.style.opacity = '1';
        advanceLeg(); // reached this waypoint — move to the next leg
        return;
      }
    } else {
      arrivedBadge.classList.remove('show');
      arrowSvg.style.opacity = '1';
      distText.style.color = '#f4ecdc';
      distText.textContent = distance < 1000 ? `${Math.round(distance)} m` : `${(distance/1000).toFixed(2)} km`;

      // secondary advance condition: already closer to the next waypoint
      // than the current one — handles legs shorter than GPS noise
      if (hasNextLeg()){
        const nextTarget = activeWaypoints[legIndex + 1];
        const distToNext = calculateDistance(userLat, userLng, nextTarget.lat, nextTarget.lng);
        if (distToNext < distance){
          advanceLeg();
          return;
        }
      }
    }

    headingBadge.textContent = `hdg ${Math.round(smoothedHeading)}°`;
  }

  // ============================================================
  // AR PIN + trail (bonus visual layer, best-effort)
  // ============================================================
  function updateArPin(){
    const target = currentTarget();
    const marker = document.getElementById('destinationMarker');
    const label = document.getElementById('destinationLabel');
    marker.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng}`);
    label.setAttribute('gps-new-entity-place', `latitude: ${target.lat}; longitude: ${target.lng}`);
    destText.setAttribute('value', target.label);
  }

  function drawWaypointTrail(){
    const container = document.getElementById('pathContainer');
    container.innerHTML = '';
    // one small marker dot per remaining waypoint on the route (real captured points, not interpolated)
    for (let i = legIndex; i < activeWaypoints.length; i++){
      const wp = activeWaypoints[i];
      const entity = document.createElement('a-entity');
      entity.setAttribute('gps-new-entity-place', `latitude: ${wp.lat}; longitude: ${wp.lng}`);
      entity.setAttribute('position', '0 0.1 0');

      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', '0.12');
      sphere.setAttribute('color', i === activeWaypoints.length - 1 ? '#7a2e2e' : '#e0a527');
      sphere.setAttribute('opacity', '0.75');
      sphere.setAttribute('animation', 'property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 1400; dir: alternate; loop: true; easing: easeInOutSine');

      entity.appendChild(sphere);
      container.appendChild(entity);
    }
  }

  // ============================================================
  // HEADING
  // ============================================================
  function applyHeading(rawHeading){
    if (rawHeading == null || isNaN(rawHeading)) return;
    if (smoothedHeading == null){
      smoothedHeading = rawHeading;
    } else {
      let diff = rawHeading - smoothedHeading;
      diff = ((diff + 180) % 360 + 360) % 360 - 180;
      smoothedHeading = (smoothedHeading + 0.15 * diff + 360) % 360;
    }
    updateHud();
  }

  function onOrientation(e){
    if (typeof e.webkitCompassHeading === 'number'){
      applyHeading(e.webkitCompassHeading);
      calibrateBanner.classList.remove('show');
    } else if (e.absolute && e.alpha != null){
      applyHeading((360 - e.alpha) % 360);
      calibrateBanner.classList.remove('show');
    } else if (e.alpha != null){
      applyHeading((360 - e.alpha) % 360);
      calibrateBanner.classList.add('show');
    }
  }

  // ============================================================
  // GEOLOCATION
  // ============================================================
  function onPosition(pos){
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    if (!firstFixReceived){
      firstFixReceived = true;
      loading.classList.add('hidden');
      updateArPin();
      drawWaypointTrail();
    }
    updateHud();
  }

  function onPositionError(err){
    loading.querySelector('.msg').textContent =
      "Couldn't get GPS location (" + err.message + "). Move outdoors / near a window and reload.";
  }

  // ============================================================
  // START
  // ============================================================
  async function start(){
    gateError.style.display = 'none';

    try{
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function'){
        const result = await DeviceOrientationEvent.requestPermission();
        if (result !== 'granted'){
          gateError.textContent = 'Compass permission was denied — the guide arrow needs it to know which way you\'re facing.';
          gateError.style.display = 'block';
          return;
        }
      }
    } catch(e){
      gateError.textContent = 'Could not request compass permission: ' + e.message;
      gateError.style.display = 'block';
      return;
    }

    if (!('geolocation' in navigator)){
      gateError.textContent = 'This browser does not support geolocation.';
      gateError.style.display = 'block';
      return;
    }

    gate.style.display = 'none';
    loading.classList.remove('hidden');
    headingBadge.style.display = 'block';

    window.addEventListener('deviceorientationabsolute', onOrientation, true);
    window.addEventListener('deviceorientation', onOrientation, true);

    navigator.geolocation.watchPosition(onPosition, onPositionError, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 20000
    });

    setTimeout(() => {
      if (!firstFixReceived){
        loading.querySelector('.msg').textContent =
          'Still waiting for GPS… make sure location access is allowed.';
      }
    }, 12000);
  }

  startBtn.addEventListener('click', start);

  // init
  populateRouteSelect();
  loadRoute(currentRouteKey);

})();
</script>

</body>
</html>
