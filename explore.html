<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Explore Heritage Sites — Yatri AR</title>
  <meta name="description" content="Browse Nepal's UNESCO World Heritage Sites. Filter by category, search by name, and navigate to any site with AR." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tiro+Devanagari+Sanskrit:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <style>
    .page-header {
      position: sticky; top: 0; z-index: 30;
      background: rgba(13,11,9,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: max(var(--sp-4), env(safe-area-inset-top)) var(--sp-4) var(--sp-3);
    }

    .page-header h1 {
      font-size: var(--fs-xl); font-weight: 800;
      margin: 0 0 var(--sp-3);
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: var(--sp-3);
    }
    .search-wrap .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }
    #searchInput {
      padding-left: 40px;
    }

    /* Filter chips */
    .filter-chips {
      display: flex; gap: var(--sp-2);
      overflow-x: auto; scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-chips::-webkit-scrollbar { display: none; }

    .chip-filter {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: var(--r-full);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--paper-muted);
      font-size: var(--fs-sm); font-weight: 500;
      cursor: pointer;
      transition: all var(--dur-fast);
      white-space: nowrap;
    }
    .chip-filter.active {
      background: var(--grad-gold);
      border-color: transparent;
      color: #1a0f00;
      font-weight: 700;
    }
    .chip-filter:not(.active):hover {
      border-color: var(--border-warm);
      color: var(--paper);
    }

    /* Sort row */
    .sort-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-4) var(--sp-2);
    }
    .result-count { font-size: var(--fs-sm); color: var(--paper-faint); }

    .sort-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: var(--fs-sm); color: var(--yatri-gold); font-weight: 600;
      background: none; border: none; cursor: pointer; padding: 0;
    }

    /* Sites grid */
    .sites-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--sp-3);
      padding: 0 var(--sp-4) var(--sp-3);
    }

    @media (min-width: 400px) {
      .sites-grid { grid-template-columns: 1fr 1fr; }
    }

    /* Site card */
    .site-card-item {
      background: var(--ink-3);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--dur-mid) var(--ease-default),
                  box-shadow var(--dur-mid),
                  border-color var(--dur-mid);
      animation: slide-up 0.4s ease both;
    }
    .site-card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
      border-color: var(--border-warm);
    }

    .site-thumb {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--ink-4), var(--surface));
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; position: relative;
    }
    .site-thumb-badge {
      position: absolute; top: 8px; right: 8px;
    }

    .site-info { padding: var(--sp-3); }
    .site-category {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--yatri-saffron); margin-bottom: 3px;
    }
    .site-name { font-size: var(--fs-md); font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
    .site-name-np { font-family: var(--font-deva); font-size: var(--fs-sm); color: var(--paper-muted); margin-bottom: var(--sp-2); }
    .site-desc {
      font-size: var(--fs-xs); color: var(--paper-muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .site-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: var(--sp-2); padding-top: var(--sp-2); border-top: 1px solid var(--border);
    }
    .site-dist { font-size: var(--fs-xs); color: var(--paper-faint); }
    .site-nav-btn {
      font-size: 11px; font-weight: 700; padding: 5px 10px;
      border-radius: var(--r-full); border: none; cursor: pointer;
      background: var(--grad-gold); color: #1a0f00;
    }

    /* Empty state */
    #emptyState {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: var(--sp-8) var(--sp-5); text-align: center; color: var(--paper-faint);
    }
    #emptyState .empty-icon { font-size: 56px; margin-bottom: var(--sp-3); }

    /* ========== DETAIL MODAL ========== */
    .detail-header {
      display: flex; align-items: flex-start; gap: var(--sp-3);
      margin-bottom: var(--sp-4);
    }
    .detail-emoji { font-size: 48px; }
    .detail-title { font-size: var(--fs-xl); font-weight: 800; margin: 0; line-height: 1.1; }
    .detail-subtitle { font-family: var(--font-deva); font-size: var(--fs-md); color: var(--paper-muted); margin-top: 4px; }

    .detail-badges { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-4); }

    .detail-section { margin-bottom: var(--sp-4); }
    .detail-section-title { font-size: var(--fs-sm); font-weight: 700; color: var(--yatri-gold); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: var(--sp-2); }
    .detail-text { font-size: var(--fs-sm); color: var(--paper-muted); line-height: 1.7; }

    .tip-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--sp-2); }
    .tip-list li {
      display: flex; gap: var(--sp-2); align-items: flex-start;
      font-size: var(--fs-sm); color: var(--paper-muted); line-height: 1.5;
    }
    .tip-list li::before { content: "💡"; flex-shrink: 0; margin-top: 1px; }

    .detail-cta { display: flex; gap: var(--sp-3); flex-wrap: wrap; margin-top: var(--sp-5); }

    /* Accuracy indicator */
    #gpsBar {
      display: flex; align-items: center; gap: 6px;
      padding: 0 var(--sp-4) var(--sp-2);
      font-size: var(--fs-xs); color: var(--paper-faint);
    }
    .gps-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--paper-faint); }
    .gps-dot.good { background: var(--yatri-sage); }
    .gps-dot.fair { background: var(--yatri-gold); }

    .bottom-spacer { height: 80px; }
  </style>
</head>
<body>

  <!-- PAGE HEADER -->
  <header class="page-header" role="banner">
    <h1>🏛️ Explore Nepal</h1>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="searchInput"
        class="input select"
        placeholder="Search temples, stupas…"
        aria-label="Search heritage sites"
        autocomplete="off"
      />
    </div>

    <!-- Category filter -->
    <div class="filter-chips" role="group" aria-label="Filter by category">
      <button class="chip-filter active" data-cat="all" aria-pressed="true">🌏 All</button>
      <button class="chip-filter" data-cat="temple" aria-pressed="false">🛕 Temples</button>
      <button class="chip-filter" data-cat="stupa" aria-pressed="false">☸️ Stupas</button>
      <button class="chip-filter" data-cat="durbar" aria-pressed="false">🏛️ Durbars</button>
      <button class="chip-filter" data-cat="natural" aria-pressed="false">🌸 Natural</button>
    </div>
  </header>

  <!-- GPS accuracy bar -->
  <div id="gpsBar" aria-live="polite" aria-label="GPS status">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsText">Locating you…</span>
  </div>

  <!-- Sort + count row -->
  <div class="sort-row">
    <div class="result-count" id="resultCount" aria-live="polite">Loading sites…</div>
    <button class="sort-btn" id="sortBtn" aria-label="Toggle sort order">
      <span id="sortIcon">📏</span>
      <span id="sortLabel">Nearest first</span>
    </button>
  </div>

  <!-- Sites grid -->
  <main id="main">
    <div class="sites-grid" id="sitesGrid" role="list" aria-label="Heritage sites">
      <!-- Populated by JS -->
    </div>
    <div id="emptyState" role="status" aria-live="polite">
      <div class="empty-icon">🔎</div>
      <div style="font-size: var(--fs-lg); font-weight: 700; color: var(--paper-muted); margin-bottom: var(--sp-2);">No sites found</div>
      <div style="font-size: var(--fs-sm);">Try a different search or category filter</div>
    </div>
    <div class="bottom-spacer"></div>
  </main>

  <!-- ========== DETAIL MODAL ========== -->
  <div class="modal-overlay" id="detailModal" role="dialog" aria-modal="true" aria-label="Site detail">
    <div class="bottom-sheet" id="detailSheet">
      <div class="sheet-handle"></div>

      <div class="detail-header">
        <div class="detail-emoji" id="detailEmoji" aria-hidden="true">🛕</div>
        <div>
          <h2 class="detail-title" id="detailTitle">Temple Name</h2>
          <div class="detail-subtitle" id="detailSubtitle" lang="ne">नाम</div>
        </div>
      </div>

      <div class="detail-badges" id="detailBadges"></div>

      <div class="detail-section">
        <div class="detail-section-title">About</div>
        <p class="detail-text" id="detailDesc"></p>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">📜 History</div>
        <p class="detail-text" id="detailHistory"></p>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">✨ Legend</div>
        <p class="detail-text" id="detailLegend"></p>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">💡 Visitor Tips</div>
        <ul class="tip-list" id="detailTips"></ul>
      </div>

      <div class="detail-cta">
        <a id="detailNavBtn" href="navigate.html" class="btn btn-primary btn-lg flex-1">
          📍 Navigate in AR
        </a>
        <button class="btn btn-ghost btn-icon" id="closeModal" aria-label="Close detail panel">✕</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="nav-item" aria-label="Home">
      <span class="nav-item__icon" aria-hidden="true">🏠</span>
      <span class="nav-item__label">Home</span>
    </a>
    <a href="explore.html" class="nav-item active" aria-label="Explore sites" aria-current="page">
      <span class="nav-item__icon" aria-hidden="true">🗺️</span>
      <span class="nav-item__label">Explore</span>
    </a>
    <a href="navigate.html" class="nav-item" aria-label="AR Navigation">
      <span class="nav-item__icon" aria-hidden="true">📍</span>
      <span class="nav-item__label">Navigate</span>
    </a>
    <a href="quiz.html" class="nav-item" aria-label="Cultural quiz">
      <span class="nav-item__icon" aria-hidden="true">🧠</span>
      <span class="nav-item__label">Quiz</span>
    </a>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/sites-data.js"></script>
  <script>
  (function () {
    "use strict";

    let allSites = [...YATRI_SITES];
    let filteredSites = [...allSites];
    let activeCategory = "all";
    let searchQuery = "";
    let sortMode = "nearest"; // "nearest" | "alpha"
    let userLat = null, userLng = null;

    // ---- GPS ----
    const gpsDot = document.getElementById("gpsDot");
    const gpsText = document.getElementById("gpsText");

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          const acc = Math.round(pos.coords.accuracy);
          gpsDot.className = "gps-dot " + (acc <= 15 ? "good" : "fair");
          gpsText.textContent = `GPS ±${acc}m`;
          renderSites();
        },
        () => {
          gpsText.textContent = "Location unavailable";
        },
        { enableHighAccuracy: true, maximumAge: 3000 }
      );
    }

    // ---- Distance util ----
    function distance(site) {
      if (userLat == null) return Infinity;
      const toRad = (d) => (d * Math.PI) / 180;
      const R = 6371000;
      const dP = toRad(site.lat - userLat);
      const dL = toRad(site.lng - userLng);
      const a = Math.sin(dP/2)**2 + Math.cos(toRad(userLat))*Math.cos(toRad(site.lat))*Math.sin(dL/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function fmtDist(m) {
      return m === Infinity ? "" : m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
    }

    // ---- Filter & sort ----
    function applyFilters() {
      filteredSites = allSites.filter((s) => {
        const catMatch = activeCategory === "all" || s.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const nameMatch = s.name.toLowerCase().includes(q) || s.description.toLowerCase().includes(q);
        return catMatch && nameMatch;
      });

      if (sortMode === "nearest") {
        filteredSites.sort((a, b) => distance(a) - distance(b));
      } else {
        filteredSites.sort((a, b) => a.name.localeCompare(b.name));
      }
    }

    // ---- Render ----
    function renderSites() {
      applyFilters();
      const grid = document.getElementById("sitesGrid");
      const empty = document.getElementById("emptyState");
      const count = document.getElementById("resultCount");

      grid.innerHTML = "";
      count.textContent = `${filteredSites.length} site${filteredSites.length !== 1 ? "s" : ""}`;

      if (filteredSites.length === 0) {
        empty.style.display = "flex";
        grid.style.display = "none";
        return;
      }
      empty.style.display = "none";
      grid.style.display = "grid";

      filteredSites.forEach((site, idx) => {
        const dist = distance(site);
        const card = document.createElement("div");
        card.className = "site-card-item";
        card.style.animationDelay = `${idx * 0.06}s`;
        card.setAttribute("role", "listitem");
        card.setAttribute("tabindex", "0");
        card.setAttribute("aria-label", `${site.name}, ${site.district}`);
        card.innerHTML = `
          <div class="site-thumb" aria-hidden="true">
            ${site.emoji}
            <div class="site-thumb-badge">
              ${site.unescoStatus ? '<span class="badge badge-teal">UNESCO</span>' : ""}
            </div>
          </div>
          <div class="site-info">
            <div class="site-category">${YATRI_CATEGORIES[site.category].label} · ${site.district}</div>
            <div class="site-name">${site.name}</div>
            <div class="site-name-np" lang="ne">${site.nameNp}</div>
            <div class="site-desc">${site.description}</div>
            <div class="site-footer">
              <div class="site-dist">${fmtDist(dist) || "Nepal"}</div>
              <button class="site-nav-btn" data-id="${site.id}" aria-label="Navigate to ${site.name}">Navigate →</button>
            </div>
          </div>
        `;
        card.addEventListener("click", () => openDetail(site));
        card.addEventListener("keydown", (e) => { if (e.key === "Enter") openDetail(site); });
        const navBtn = card.querySelector(".site-nav-btn");
        navBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          window.location.href = `navigate.html?site=${site.id}`;
        });
        grid.appendChild(card);
      });
    }

    // ---- Category filter ----
    document.querySelectorAll(".chip-filter").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chip-filter").forEach((b) => {
          b.classList.remove("active");
          b.setAttribute("aria-pressed", "false");
        });
        btn.classList.add("active");
        btn.setAttribute("aria-pressed", "true");
        activeCategory = btn.dataset.cat;
        renderSites();
        // Update URL hash
        history.replaceState(null, "", activeCategory === "all" ? "#" : `#${activeCategory}`);
      });
    });

    // ---- Search ----
    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchQuery = e.target.value.trim();
      renderSites();
    });

    // ---- Sort ----
    document.getElementById("sortBtn").addEventListener("click", () => {
      sortMode = sortMode === "nearest" ? "alpha" : "nearest";
      document.getElementById("sortIcon").textContent = sortMode === "nearest" ? "📏" : "🔤";
      document.getElementById("sortLabel").textContent = sortMode === "nearest" ? "Nearest first" : "A–Z";
      renderSites();
    });

    // ---- Read hash for deep link ----
    const hash = location.hash.replace("#", "");
    if (hash && YATRI_CATEGORIES[hash]) {
      const btn = document.querySelector(`[data-cat="${hash}"]`);
      if (btn) btn.click();
    }

    // ---- Detail modal ----
    function openDetail(site) {
      document.getElementById("detailEmoji").textContent = site.emoji;
      document.getElementById("detailTitle").textContent = site.name;
      document.getElementById("detailSubtitle").textContent = site.nameNp;
      document.getElementById("detailDesc").textContent = site.description;
      document.getElementById("detailHistory").textContent = site.history;
      document.getElementById("detailLegend").textContent = site.legend;

      const tips = document.getElementById("detailTips");
      tips.innerHTML = site.tips.map((t) => `<li>${t}</li>`).join("");

      const badges = document.getElementById("detailBadges");
      badges.innerHTML = `
        <span class="badge badge-saffron">${YATRI_CATEGORIES[site.category].label}</span>
        ${site.unescoStatus ? '<span class="badge badge-teal">UNESCO ✓</span>' : ""}
        <span class="badge badge-muted">⭐ ${site.rating}</span>
        <span class="badge badge-muted">${site.district}</span>
      `;

      document.getElementById("detailNavBtn").href = `navigate.html?site=${site.id}`;

      const modal = document.getElementById("detailModal");
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      document.getElementById("detailModal").classList.remove("open");
      document.body.style.overflow = "";
    }

    document.getElementById("closeModal").addEventListener("click", closeModal);
    document.getElementById("detailModal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("detailModal")) closeModal();
    });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    // ---- Toast ----
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => t.classList.remove("show"), 2000);
    }

    // Initial render
    renderSites();
  })();
  </script>
</body>
</html>
